<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Traducteur PDF</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="conteneur">
    <h1>Traducteur PDF</h1>
    <p class="sous-titre">Traduction locale via Ollama — aucune donnée ne quitte ton ordinateur.</p>

    <section class="carte" id="statut-section">
      <h2>État du système</h2>
      <p id="statut-api">Vérification en cours...</p>
      <p id="statut-ollama"></p>
    </section>

    <section class="carte">
      <h2>1. Document à traduire</h2>
      <p class="aide">Chemin complet du fichier PDF sur ton ordinateur (ex: /Users/toi/Documents/chapitre1.pdf)</p>
      <input type="text" id="chemin-pdf" placeholder="/Users/.../document.pdf">
    </section>

    <section class="carte">
      <h2>2. Options</h2>
      <label for="modele">Modèle Ollama :</label>
      <select id="modele"></select>

      <label for="langue-source">Langue source :</label>
      <select id="langue-source">
        <option value="anglais">Anglais</option>
        <option value="francais">Français</option>
        <option value="espagnol">Espagnol</option>
      </select>

      <label for="langue-cible">Langue cible :</label>
      <select id="langue-cible">
        <option value="francais" selected>Français</option>
        <option value="anglais">Anglais</option>
        <option value="espagnol">Espagnol</option>
      </select>
    </section>

    <section class="carte">
      <button id="bouton-analyser" class="bouton-secondaire">Analyser le document</button>
      <button id="bouton-traduire" class="bouton-principal">Traduire</button>
      <button id="bouton-reprendre" class="bouton-principal" hidden>⏯ Reprendre (<span id="reprise-progression"></span>)</button>
    </section>

    <section class="carte" id="resultat-analyse" hidden>
      <h2>Résultat de l'analyse</h2>
      <pre id="contenu-analyse"></pre>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
